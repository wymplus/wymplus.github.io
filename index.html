    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王一鸣 - 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1a56db',
                        secondary: '#4b5563',
                        accent: '#0ea5e9',
                        light: '#f3f4f6',
                        dark: '#1f2937'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'card': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                        'card-hover': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            }
            .bg-gradient {
                background: linear-gradient(135deg, #1a56db 0%, #0ea5e9 100%);
            }
            .skill-tag {
                @apply px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-sm font-medium transition-all duration-200;
            }
            .skill-tag:hover {
                @apply bg-blue-200 transform scale-105;
            }
            .timeline-dot {
                @apply absolute left-0 w-4 h-4 bg-primary rounded-full border-2 border-white;
            }
            .timeline-line {
                @apply absolute left-2 top-4 bottom-0 w-0.5 bg-gray-200;
            }
            .card-hover {
                @apply transition-all duration-300 hover:shadow-card-hover hover:-translate-y-1;
            }
            .section-divider {
                @apply w-16 h-1 bg-gradient rounded-full my-6;
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <!-- 访问验证 -->
    <section id="authGate" class="min-h-screen flex items-center justify-center px-4 py-12 bg-slate-100">
        <div class="w-full max-w-md overflow-hidden rounded-xl bg-white shadow-card border border-blue-100">
            <div class="h-1.5 bg-gradient"></div>
            <div class="p-8">
                <div class="flex items-center gap-4 mb-3">
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center flex-shrink-0">
                        <i class="fa fa-lock text-primary text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold text-dark leading-tight">简历访问验证</h1>
                        <p class="text-sm text-secondary mt-1">Resume access</p>
                    </div>
                </div>
                <p class="text-secondary mb-6 leading-relaxed">请输入访问密码，验证通过后查看完整简历内容。</p>
                <form id="authForm" class="space-y-5">
                    <div>
                        <label for="resumePassword" class="block text-sm font-medium text-secondary mb-2">访问密码</label>
                        <div class="relative">
                            <i class="fa fa-key absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input
                                id="resumePassword"
                                type="text"
                                autocomplete="off"
                                autocapitalize="off"
                                spellcheck="false"
                                class="w-full rounded-lg border border-gray-300 bg-gray-50 px-4 py-3 pl-11 text-dark outline-none transition focus:border-primary focus:bg-white focus:ring-2 focus:ring-blue-100"
                                placeholder="请输入密码"
                            >
                        </div>
                        <p id="authError" class="hidden mt-2 text-sm text-red-600">密码不正确，请重新输入。</p>
                    </div>
                    <button type="submit" class="group w-full rounded-lg bg-primary px-4 py-3 font-medium text-white shadow-sm transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-200">
                        <span>查看简历</span>
                        <i class="fa fa-arrow-right ml-2 transition-transform group-hover:translate-x-1"></i>
                    </button>
                </form>
            </div>
        </div>
    </section>

    <!-- 主要内容 -->

        const authGate = document.getElementById('authGate');
        const resumeContent = document.getElementById('resumeContent');
        const authForm = document.getElementById('authForm');
        const passwordInput = document.getElementById('resumePassword');
        const authError = document.getElementById('authError');
        let resumeInitialized = false;

        async function sha256(value) {
            const buffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(value));
            return Array.from(new Uint8Array(buffer)).map(byte => byte.toString(16).padStart(2, '0')).join('');
        }

        function base64ToBytes(value) {
            return Uint8Array.from(atob(value), char => char.charCodeAt(0));
        }

        async function deriveResumeKey(password) {
            const keyMaterial = await crypto.subtle.importKey(
                'raw',
                new TextEncoder().encode(password),
                'PBKDF2',
                false,
                ['deriveKey']
            );

            return crypto.subtle.deriveKey(
                {
                    name: 'PBKDF2',
                    salt: base64ToBytes(RESUME_SALT),
                    iterations: 120000,
                    hash: 'SHA-256'
                },
                keyMaterial,
                { name: 'AES-GCM', length: 256 },
                false,
                ['decrypt']
            );
        }

        async function decryptResume(password) {
            const encryptedBytes = base64ToBytes(ENCRYPTED_RESUME);
            const key = await deriveResumeKey(password);
            const decrypted = await crypto.subtle.decrypt(
                { name: 'AES-GCM', iv: base64ToBytes(RESUME_IV) },
                key,
                encryptedBytes
            );

            return new TextDecoder().decode(decrypted);
        }

        async function showResume(password) {
            const resumeHtml = await decryptResume(password);
            resumeContent.innerHTML = resumeHtml;
            authGate.classList.add('hidden');
            resumeContent.classList.remove('hidden');
            initResumeInteractions();
        }

        authForm.addEventListener('submit', async function(event) {
            event.preventDefault();
            const password = passwordInput.value;
            const inputHash = await sha256(password);

            if (inputHash === PASSWORD_HASH) {
                try {
                    await showResume(password);
                    return;
                } catch (error) {
                    console.error('Resume decrypt failed', error);
                }
            }

            authError.classList.remove('hidden');
            passwordInput.classList.add('border-red-400', 'focus:border-red-500', 'focus:ring-red-100');
            passwordInput.focus();
            passwordInput.select();
        });

        passwordInput.addEventListener('input', function() {
            authError.classList.add('hidden');
            passwordInput.classList.remove('border-red-400', 'focus:border-red-500', 'focus:ring-red-100');
        });

        function initResumeInteractions() {
            if (resumeInitialized) {
                return;
            }
            resumeInitialized = true;

            // 打印功能
            const printBtn = document.getElementById('printBtn');
            if (printBtn) {
                printBtn.addEventListener('click', function() {
                    window.print();
                });
            }

            // 平滑滚动
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({
                            behavior: 'smooth',
                            block: 'start'
                        });
                    }
                });
            });

            // 技能标签悬停效果
            document.querySelectorAll('.skill-tag').forEach(tag => {
                tag.addEventListener('mouseenter', function() {
                    this.classList.add('scale-105');
                });
                tag.addEventListener('mouseleave', function() {
                    this.classList.remove('scale-105');
                });
            });

            // 卡片滚动动画
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver(function(entries) {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('opacity-100', 'translate-y-0');
                        entry.target.classList.remove('opacity-0', 'translate-y-4');
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.card-hover').forEach(card => {
                card.classList.add('transition-all', 'duration-500', 'opacity-0', 'translate-y-4');
                observer.observe(card);
            });
        }
    </script>
